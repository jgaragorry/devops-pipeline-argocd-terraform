apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-lab-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jgaragorry/devops-pipeline-argocd-terraform.git
    targetRevision: HEAD
    path: k8s/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
